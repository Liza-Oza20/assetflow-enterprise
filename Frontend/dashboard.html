<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>AssetFlow</h1>
    </div>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="assets.html">Assets</a></li>
            <li><a href="resources.html">Resources</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </nav>
</header>

<section class="dashboard">
    <h2>Enterprise Dashboard</h2>
    <p>Monitor and manage enterprise assets and resources from one place.</p>

    <div class="dashboard-cards">

        <div class="dashboard-card">
            <h3>Total Assets</h3>
            <h1>250</h1>
        </div>

        <div class="dashboard-card">
            <h3>Available Resources</h3>
            <h1>180</h1>
        </div>

        <div class="dashboard-card">
            <h3>Employees</h3>
            <h1>75</h1>
        </div>

        <div class="dashboard-card">
            <h3>Maintenance</h3>
            <h1>12</h1>
        </div>

    </div>

    <div class="quick-actions">
        <a href="assets.html" class="btn">Manage Assets</a>
        <a href="resources.html" class="btn">Manage Resources</a>
        <a href="reports.html" class="btn">View Reports</a>
    </div>

</section>

</body>
</html>
